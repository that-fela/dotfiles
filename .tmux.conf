# Prefix to a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal / colour
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# General
set -s set-clipboard off
set -g mouse on
set -g history-limit 100000
set -sg escape-time 0
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi

# Copy mode / clipboard (X11 + xclip)
unbind i
bind i copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe "xclip -i -selection clipboard"
bind -T copy-mode-vi d send -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "xclip -i -selection clipboard"
bind -T copy-mode-vi Escape send -X cancel

# Status bar at top
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#f9e2af"

# Left / right status
set -g status-left-length 60
set -g status-right-length 120
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#6c7086]| "
set -g status-right "#[fg=#f9e2af]%Y-%m-%d #[fg=#89dceb]%H:%M #[fg=#6c7086]| #[fg=#f38ba8]#(cut -d' ' -f1-3 /proc/loadavg 2>/dev/null || uptime | sed 's/.*load averages*: //') "

# Window tabs
setw -g window-status-format " #[fg=#a6adc8]#I:#W "
setw -g window-status-current-format " #[bg=#89b4fa,fg=#1e1e2e,bold]#I:#W "
setw -g window-status-current-style ""
setw -g window-status-style "bg=#1e1e2e,fg=#a6adc8"

# Vim-style pane movement without prefix
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

